<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Megamania Remake - Atari Classic</title>
    <meta name="description" content="Um remake fiel do clássico Megamania do Atari, desenvolvido com HTML5 Canvas e TypeScript.">
</head>
<body>
    <div id="game-container">
        <div id="ui-top">
            <div id="score-container">SCORE: <span id="score">000000</span></div>
            <div id="lives-container">LIVES: <span id="lives">3</span></div>
        </div>
        
        <canvas id="game-canvas"></canvas>
        
        <div id="ui-bottom">
            <div id="energy-bar-container">
                <div id="energy-bar-label">ENERGY</div>
                <div id="energy-bar-outer">
                    <div id="energy-bar-inner"></div>
                </div>
            </div>
            <div id="level-container">LEVEL: <span id="level">1</span></div>
        </div>

        <!-- Mobile Controls Overlay -->
        <div id="mobile-controls">
            <div id="btn-left" class="control-btn">◀</div>
            <div id="btn-right" class="control-btn">▶</div>
            <div id="btn-fire" class="control-btn">FIRE</div>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
